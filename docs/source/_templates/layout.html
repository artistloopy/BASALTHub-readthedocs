{% extends "!layout.html" %}

{# Inject the BASALTHub banner markup once, then move it to the top of <body> on load. #}
{% block extrahead %}
  {{ super() }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var banner = document.getElementById('basalthub-banner');
      if (banner && document.body && document.body.firstChild !== banner) {
        document.body.insertBefore(banner, document.body.firstChild);
      }
    });
  </script>
  <script>
    // Update footer copyright text on load so we don't have to override theme templates.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var info = document.querySelector('footer div[role="contentinfo"] p');
        if (info) {
          info.textContent = '© Copyright 2021-2026, EMBL, PKU';
        }
      } catch (e) {
        // noop
      }
    });
  </script>
  <script>
    // Add a custom right-side arrow to top-level sidebar links.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var topLevelItems = document.querySelectorAll('.wy-menu-vertical li.toctree-l1');
        topLevelItems.forEach(function (item) {
          var link = item.querySelector(':scope > a');
          if (!link) {
            return;
          }
          if (link.querySelector('.basalthub-nav-arrow')) {
            return;
          }
          var arrow = document.createElement('span');
          arrow.className = 'basalthub-nav-arrow';
          arrow.setAttribute('aria-hidden', 'true');
          arrow.textContent = '›';
          link.appendChild(arrow);

          var childList = item.querySelector(':scope > ul');
          if (childList) {
            link.addEventListener('click', function (event) {
              if (link.getAttribute('href') === '#' || link.classList.contains('current')) {
                event.preventDefault();
                item.classList.toggle('basalthub-collapsed');
              }
            });
          }
        });
      } catch (e) {
        // noop
      }
    });
  </script>
  <script>
    // Make the sidebar caption clickable so it navigates back to the docs home page.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var captionText = document.querySelector('.wy-menu-vertical .caption .caption-text');
        if (captionText && !captionText.querySelector('a')) {
          var link = document.createElement('a');
          link.href = '{{ pathto(master_doc) }}';
          link.textContent = captionText.textContent;
          link.className = 'basalthub-caption-link';
          captionText.textContent = '';
          captionText.appendChild(link);
        }
      } catch (e) {
        // noop
      }
    });
  </script>
{% endblock %}

{% block content %}
  <div id="basalthub-banner">
    <div class="banner-inner">
      <a class="basalthub-title" href="{{ pathto(master_doc) }}"><strong>BASALTHub</strong></a>
      <div class="basalthub-banner-spacer"></div>
      <a class="github-link" href="https://github.com/EMBL-PKU/BASALT" target="_blank" rel="noopener noreferrer" aria-label="Open BASALT on GitHub">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
      </a>
      <span class="github-stat-wrap">
        <a class="github-stat" href="https://github.com/EMBL-PKU/BASALT/stargazers" target="_blank" rel="noopener noreferrer" aria-label="BASALT stars">
          Star 128
        </a>
      </span>
      <span class="github-stat-wrap">
        <a class="github-stat" href="https://github.com/EMBL-PKU/BASALT/forks" target="_blank" rel="noopener noreferrer" aria-label="BASALT forks">
          Fork 18
        </a>
      </span>
    </div>
  </div>
  {{ super() }}
{% endblock %}
